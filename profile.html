<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspirant Profile | CrashStudy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Reusing your exact color variables and Glassmorphism styles */
        :root {
            --bg-obsidian: #070913; --bg-glass: rgba(255, 255, 255, 0.04);
            --border-glass: rgba(255, 255, 255, 0.08); --border-cyan: rgba(0, 240, 255, 0.35);
            --cyan: #00F0FF; --pink: #FF007A; --text-primary: #F0F4FF; --text-muted: rgba(140, 155, 200, 0.5);
            --radius-md: 14px; --radius-lg: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-obsidian); background-image: radial-gradient(circle at 50% 0%, #1e264a, transparent); color: var(--text-primary); min-height: 100vh; padding: 40px 20px; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Poppins'; font-size: 2.2rem; background: linear-gradient(135deg, var(--cyan), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-back { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .btn-back:hover { color: var(--cyan); }

        .profile-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        
        /* Glass Cards */
        .glass-card { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: 30px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        
        /* User Info Badge */
        .user-badge { text-align: center; }
        .avatar-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--border-cyan); margin-bottom: 15px; box-shadow: 0 0 20px rgba(0,240,255,0.2); }
        .user-name { font-family: 'Poppins'; font-size: 1.4rem; margin-bottom: 5px; }
        .user-email { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }
        .streak-display { display: inline-block; background: rgba(255, 138, 0, 0.1); color: #FF8A00; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; border: 1px solid rgba(255, 138, 0, 0.3); }
        
        /* Form Elements */
        .form-section h3 { font-family: 'Poppins'; font-size: 1.2rem; margin-bottom: 20px; color: var(--cyan); border-bottom: 1px solid var(--border-glass); padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input, .input-group select { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass); border-radius: var(--radius-md); color: white; font-size: 0.95rem; transition: all 0.3s; outline: none; appearance: none; }
        .input-group input:focus, .input-group select:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); }
        .input-group select option { background: var(--bg-obsidian); }
        
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--cyan), var(--pink)); border: none; border-radius: var(--radius-md); color: #fff; font-weight: 600; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; font-family: 'Poppins'; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 0, 122, 0.3); }
        
        .status-msg { margin-top: 15px; text-align: center; font-size: 0.9rem; min-height: 20px; }
        .success { color: #00F0A8; }
        .error { color: #FF6B6B; }

        .chart-container { margin-top: 30px; position: relative; height: 300px; width: 100%; }

        @media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Aspirant Command Center</h1>
            <a href="index.html" class="btn-back">← Back to Dashboard</a>
        </div>

        <div class="profile-grid">
            <div class="glass-card user-badge">
                <img id="profileAvatar" src="https://ui-avatars.com/api/?name=Aspirant&background=00F0FF&color=000" alt="Avatar" class="avatar-img">
                <h2 id="profileName" class="user-name">Loading...</h2>
                <p id="profileEmail" class="user-email">loading@crashstudy.com</p>
                <div id="profileStreak" class="streak-display">🔥 0 Days</div>
                
                <button id="logoutBtn" style="margin-top: 30px; background: transparent; border: 1px solid var(--pink); color: var(--pink); padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s;">Sign Out</button>
            </div>

            <div>
                <div class="glass-card form-section" style="margin-bottom: 30px;">
                    <h3>Update Combat Parameters</h3>
                    
                    <div class="input-group">
                        <label>Operative Name</label>
                        <input type="text" id="inputName" placeholder="Your Full Name">
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="input-group">
                            <label>Age</label>
                            <input type="number" id="inputAge" placeholder="e.g. 21">
                        </div>
                        <div class="input-group">
                            <label>Gender</label>
                            <select id="inputGender">
                                <option value="" disabled selected>Select</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Primary Target Exam</label>
                        <select id="inputExam">
                            <option value="" disabled selected>Select your battlefield</option>
                            <option value="SSC CGL">SSC CGL</option>
                            <option value="AFCAT">AFCAT</option>
                            <option value="CAPF">CAPF (AC)</option>
                            <option value="UPSC">UPSC CSE</option>
                            <option value="Banking">Banking/IBPS</option>
                        </select>
                    </div>

                    <button class="btn-primary" id="saveProfileBtn">Sync Data to Server</button>
                    <div id="statusMessage" class="status-msg"></div>
                </div>

                <div class="glass-card form-section">
                    <h3>Mock Test Trajectory</h3>
                    <div class="chart-container">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="profile.js"></script>
</body>
</html>
