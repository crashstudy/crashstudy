<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Under Construction | CrashStudy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
    body {
    background-color: #070913;
    color: white;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    }
    .container { text-align: center; max-width: 500px; padding: 20px; }
    .construct-img { width: 150px; margin-bottom: 20px; animation: bounce 2s infinite; }
    @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
    }
    h1 { font-family: 'Poppins'; font-size: 2.5rem; margin-bottom: 10px; }
    p { color: #A0A5B5; margin-bottom: 30px; }
    .btn-home {
    background: linear-gradient(45deg, #00F0FF, #FF007A);
    padding: 12px 30px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    }
    
    
    </style>
</head>
<body>
    <div class="container">
        <img src="construction.png" alt="Under Construction" class="construct-img">
        
        <h1>Under Construction 🚧</h1>
        <p>Sorry! for inconvenience. We are working on this page right now. STAY TUNED !!!</p>
        
        <a href="index.html" class="btn-home">Back to Home</a>
    </div>
</body>
</html>
